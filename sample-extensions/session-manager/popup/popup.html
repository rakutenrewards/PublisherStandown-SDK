<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Session Manager · Standdown SDK</title>
    <style>
      body { font-family: monospace; font-size: 12px; min-width: 360px; padding: 12px; }

      #status { font-weight: bold; margin-bottom: 8px; }
      #status.match { color: #d32f2f; }
      #status.clean  { color: #388e3c; }
      #status.loading { color: #555; }

      pre { background: #f5f5f5; padding: 8px; overflow-x: auto; margin: 0; }

      .section-label {
        font-size: 10px;
        font-weight: bold;
        color: #888;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
      }

      .section-divider { border: none; border-top: 1px solid #ddd; margin: 10px 0; }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px;
      }

      #decision-status { font-weight: bold; margin-bottom: 4px; }
      #decision-status.standdown { color: #d32f2f; }
      #decision-status.no-standdown { color: #388e3c; }
      #decision-reason { font-size: 11px; color: #555; }

      #session-status.session-active { color: #1565c0; font-weight: bold; }
      #session-status.session-none   { color: #888; }
      #session-timestamp { font-size: 10px; color: #888; }

      #session-detection { margin-top: 6px; }
      #session-tab { font-size: 11px; color: #555; margin-bottom: 4px; }

      .subsection-label { font-weight: bold; margin: 6px 0 2px; }

      ol#redirect-chain {
        margin: 0 0 4px 0;
        padding-left: 20px;
      }
      ol#redirect-chain li {
        word-break: break-all;
        margin-bottom: 2px;
      }

      .match-entry {
        background: #f5f5f5;
        padding: 4px 6px;
        margin-bottom: 4px;
      }
      .match-network { font-weight: bold; }
      .match-url { word-break: break-all; color: #555; }
      .match-rule { color: #888; }
    </style>
  </head>
  <body>
    <div id="on-demand-section">
      <div id="status" class="loading">Checking…</div>

      <div class="section-label">ON-DEMAND CHECK</div>
      <pre id="result"></pre>

      <hr class="section-divider">
    </div>

    <div class="section-label">DECISION</div>
    <div id="decision-section">
      <div id="decision-status"></div>
      <div id="decision-reason"></div>
    </div>

    <hr class="section-divider">

    <div class="section-header">
      <span class="section-label">SESSION</span>
      <span id="session-timestamp"></span>
    </div>
    <div id="session-section">
      <div id="session-status" class="session-none">Checking…</div>
      <div id="session-detection" style="display:none">
        <div id="session-tab"></div>
        <div id="redirect-chain-section" style="display:none">
          <div class="subsection-label">Redirect Chain</div>
          <ol id="redirect-chain"></ol>
        </div>
        <div id="matched-patterns-section" style="display:none">
          <div class="subsection-label">Matches</div>
          <div id="matched-patterns"></div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
